services:
  db:
    image: postgres:16-alpine
    container_name: mathhelper-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mathhelper_db
    ports:
      - "5432:5432"
    volumes:
      - mathhelper_pgdata:/var/lib/postgresql/data

volumes:
  mathhelper_pgdata:
