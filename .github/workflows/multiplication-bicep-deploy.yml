name: Multiplication - Bicep deploy

# Repository variables (Settings > Secrets and variables > Actions > Variables):
#   RESOURCE_GROUP, LOCATION, MULT_APP_NAME

on:
  workflow_dispatch:

jobs:
  deploy-bicep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      
      - name: Deploy Bicep
        env:
          RESOURCE_GROUP: ${{ vars.RESOURCE_GROUP }}
          LOCATION: ${{ vars.LOCATION }}
          MULT_APP_NAME: ${{ vars.MULT_APP_NAME }}
        run: |
          az group create -n "$RESOURCE_GROUP" -l "$LOCATION"
          az deployment group create \
            --resource-group "$RESOURCE_GROUP" \
            --template-file deployment/multiplication-bicep/main.bicep \
            --parameters appName="$MULT_APP_NAME" location="$LOCATION"
