name: Multiplication - Deploy to Azure Web App

# Use this workflow when RG + App Service are created manually in Azure Portal.
# Variables: MULT_APP_NAME   Secrets: AZURE_PUBLISH_PROFILE

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '25'

    - name: Install dependencies
      run: npm install
      working-directory: Multiplication

    - name: Build
      run: npm run build
      working-directory: Multiplication

    - name: Prepare Azure deploy (static server for Node runtime)
      run: |
        cp Multiplication/azure-deploy/server.js Multiplication/azure-deploy/package.json Multiplication/dist/

    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ vars.MULT_APP_NAME }}
        publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
        package: Multiplication/dist
