# Deploy Multiplication app to Azure Static Web Apps.
# No publish profile: use deployment token from the Static Web App (Overview → Manage deployment token).
# Variables: none   Secrets: MULT_STATIC_WEB_APPS_API_TOKEN

name: Multiplication - Deploy to Static Web App

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.MULT_STATIC_WEB_APPS_API_TOKEN }}
          action: "upload"
          app_location: Multiplication
          output_location: dist
          app_build_command: npm run build
